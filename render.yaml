# render.yaml — Render Blueprint for QuickExpense Tracker
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: quickexpense
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually from Neon dashboard
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_EMAIL
        sync: false  # Set manually
      - key: SMTP_PASSWORD
        sync: false  # Set manually
      - key: SMTP_SENDER_NAME
        value: QuickExpense
